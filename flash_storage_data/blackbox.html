<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 黑匣子日志查看器</title>
    <link rel="stylesheet" href="blackbox.css">
</head>

<body>
    <div class="card">
        <h1>
            📊 黑匣子日志浏览器
            <small>BlackBox Viewer</small>
        </h1>

        <!-- 信息栏 / 总数 + 操作 -->
        <div class="info-bar">
            <div class="count-section">
                <span style="font-weight:500; color:#334155;">📁 日志总数</span>
                <span class="count-display" id="logCountDisplay">—</span>
                <button id="fetchCountBtn" class="secondary">
                    <span>🔄</span> 获取最新数量
                </button>
            </div>

            <div class="range-controls">
                <div class="range-input">
                    <label>从</label>
                    <input type="number" id="startIndex" value="0" min="0" step="1">
                </div>
                <div class="range-input">
                    <label>到</label>
                    <input type="number" id="endIndex" value="9" min="0" step="1">
                </div>
                <button id="fetchRangeBtn" class="fetch-btn">
                    <span>📥</span> 拉取日志
                </button>
            </div>
            <span class="status" id="statusMsg">就绪</span>
        </div>

        <!-- 表格区域 -->
        <div class="table-container">
            <table id="logTable">
                <thead>
                    <tr>
                        <th>索引 (原始)</th>
                        <th>校验通过</th>
                        <th>时间戳</th>
                        <th>电压 (V)</th>
                        <th>电流 (A)</th>
                        <th>mAh</th>
                        <th>mWh</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr>
                        <td colspan="8" style="text-align:center; padding:48px; color:#94a3b8;">暂无数据，请先拉取日志</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- 底部按钮 + 说明 -->
        <div class="footer-actions">
            <button id="exportCsvBtn" class="secondary">📎 导出为 CSV</button>
        </div>
        <div class="note">
            ⚡ 索引规则：0 代表最新日志，数字越大越旧。<br>
            <!-- 🔗 API 端点：<code>/api/log/count</code> 和 <code>/api/log?start=&lt;start&gt;&end=&lt;end&gt;</code> 需返回 JSON。
            所有数据均为黑匣子原始字段。 -->
        </div>
    </div>

    <script src="blackbox.js"></script>
</body>

</html>
