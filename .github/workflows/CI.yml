name: 功率计LITE代码CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: "recursive"

      - name: Build with ESP-IDF
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.5.1
          target: esp32c3            # 指定目标芯片，如 esp32s3, esp32c3
          path: "./"               # 包含项目 main 组件的路径，默认为当前目录

      - name: Create Release and Upload Bin  # 创建Release并上传.bin文件
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')  # 如果是标签推送，则执行Release操作
        with:
          files: |
            ${{ github.workspace }}/build/Wireless_power_meter_lite.bin  # ESP-IDF默认构建输出路径
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # 使用GitHub提供的token