name: 功率计LITE代码CI/CD

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: "recursive"

      - name: Build with ESP-IDF
        uses: espressif/esp-idf-ci-action@v1
        if: "!startsWith(github.ref, 'refs/tags/')"
        with:
          esp_idf_version: v6.0
          target: esp32c6
          path: "./"

      - name: Extract version from tag
        if: startsWith(github.ref, 'refs/tags/')
        id: version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          echo "major=${TAG%%.*}" >> $GITHUB_OUTPUT
          echo "minor=$(echo $TAG | cut -d. -f2)" >> $GITHUB_OUTPUT
          echo "patch=$(echo $TAG | cut -d. -f3)" >> $GITHUB_OUTPUT

      - name: Build with ESP-IDF (CD with version)
        uses: espressif/esp-idf-ci-action@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          esp_idf_version: v6.0
          target: esp32c6
          path: "./"
          command: idf.py -DVERSION_MAJOR=${{ steps.version.outputs.major }} -DVERSION_MINOR=${{ steps.version.outputs.minor }} -DVERSION_PATCH=0 build

      - name: Create Release and Upload Bin
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            ${{ github.workspace }}/build/Wireless_power_meter_lite.bin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}