name: 功率计LITE代码CI/CD

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  ci:
    name: CI Build
    if: "!startsWith(github.ref, 'refs/tags/')"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: "recursive"

      - name: Build with ESP-IDF
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v6.0
          target: esp32c6
          path: "./"

  cd:
    name: CD Build & Release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: "recursive"

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          MAJOR="${TAG%%.*}"
          MINOR="$(echo $TAG | cut -d. -f2)"
          echo "major=${MAJOR}" >> $GITHUB_OUTPUT
          echo "minor=${MINOR}" >> $GITHUB_OUTPUT
          echo "full=${MAJOR}.${MINOR}.0" >> $GITHUB_OUTPUT

      - name: Build with ESP-IDF
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v6.0
          target: esp32c6
          path: "./"
          command: idf.py -DVERSION_MAJOR=${{ steps.version.outputs.major }} -DVERSION_MINOR=${{ steps.version.outputs.minor }} -DVERSION_PATCH=0 build

      - name: Rename firmware for release
        run: |
          VERSION="${{ steps.version.outputs.full }}"
          cp build/Wireless_power_meter_lite.bin "Wireless_power_meter_lite_app_v${VERSION}.bin"
          cp Wireless_power_meter_lite_merged.bin "Wireless_power_meter_lite_merged_v${VERSION}.bin"

      - name: Create Release and Upload Bin
        uses: softprops/action-gh-release@v1
        with:
          files: |
            Wireless_power_meter_lite_app_v*.bin
            Wireless_power_meter_lite_merged_v*.bin
          body: |
            ## 无线功率计 Lite 固件 v${{ steps.version.outputs.full }}

            ### 固件说明

            | 文件 | 说明 |
            |------|------|
            | `*_merged_v*.bin` | **先烧后贴固件（推荐）**：包含 bootloader + 分区表 + APP，适用于全新烧录或 Flash 全擦除后烧录 |
            | `*_app_v*.bin` | **APP 固件**：仅包含应用程序，适用于 OTA 升级 |

            ### 烧录方式

            **先烧后贴固件（merged）：**
            [在线烧录](https://espressif.github.io/esp-launchpad/?flashConfigURL=https://raw.githubusercontent.com/qingmeijiupiao/Wireless_power_meter_lite/refs/heads/main/.github/workflows/config.toml)

            **OTA固件：**
            使用功率计连接wifi后自动检查最新版本固件,也可手动下载在升级页面拖拽固件升级
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
