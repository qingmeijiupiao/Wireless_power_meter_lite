<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>控制设置 - Wireless Power Meter Lite</title>
  <link rel="stylesheet" href="/app.css">
</head>
<body>
  <div class="layout">
    <aside>
      <div class="brand"><h1>Wireless Power Meter Lite</h1><div class="sub" id="topStatus">控制设置</div></div>
      <nav>
        <a class="tab" href="/">实时概览</a>
        <a class="tab" href="/charts.html">趋势曲线</a>
        <a class="tab active" href="/control.html">控制设置</a>
        <a class="tab" href="/status.html">状态诊断</a>
        <a class="tab" href="/logs.html">实时日志</a>
        <a class="tab" href="/blackbox.html">黑匣子日志</a>
        <a class="tab" href="/firmware.html">固件升级</a>
      </nav>
    </aside>
    <main class="stack">
      <div class="page-head"><div><h2>控制设置</h2><div class="sub">调整输出、保护、背光、CAN 和网络相关设置</div></div></div>
      <div class="stack">
        <div class="card stack">
          <strong>设备控制</strong>
          <div class="row"><span>输出开关</span><button id="outputBtn">读取中</button></div>
          <div class="row"><span>保护功能</span><button id="protectToggle">读取中</button></div>
          <div class="notice" id="protectNotice" hidden>保护功能关闭后，设备仍会显示告警状态，但不会因为保护触发而自动阻止或关闭输出。</div>
          <div class="field"><label class="label" for="backlight">屏幕背光</label><input id="backlight" type="range" min="0" max="255"><div class="sub" id="backlightText">--</div></div>
          <div class="muted" id="controlMsg"></div>
        </div>
        <div class="card stack">
          <strong>CAN 设置</strong>
          <div class="field"><label class="label" for="canBaud">波特率</label><select id="canBaud"><option value="125000">125 kbps</option><option value="250000">250 kbps</option><option value="500000">500 kbps</option><option value="800000">800 kbps</option><option value="1000000">1 Mbps</option></select></div>
          <div class="field"><label class="label" for="canId">设备 ID</label><input id="canId" placeholder="0x400 或 1024"></div>
          <button id="saveCan">保存 CAN 设置</button>
          <div class="muted">CAN 参数可能需要重启或重新初始化后完全生效。</div>
        </div>
      </div>
      <div class="card stack">
        <strong>WiFi / Web</strong>
        <div class="muted" id="wifiText">--</div>
        <div class="actions">
          <button onclick="location.href='/provision.html'">配置 WiFi</button>
          <button class="secondary" id="wifiOn">启动 WiFi/Web</button>
          <button class="secondary" id="wifiAp">进入配网模式</button>
          <button class="secondary" id="wifiBoot">切换开机启动</button>
          <button class="danger" id="wifiClear">清除保存的 WiFi</button>
        </div>
      </div>
      <div class="card stack">
        <strong>系统操作</strong>
        <div class="muted">重启会短暂中断输出控制页面和网络连接。</div>
        <div class="actions"><button class="danger" id="rebootBtn">重启设备</button></div>
      </div>
    </main>
  </div>
  <script>
    const $ = id => document.getElementById(id);
    let state = null, protect = null, wifi = null;
    function infoHtml(items) {
      return items.map(([label, value]) => `<div class="info-line"><span>${label}</span><span>${value}</span></div>`).join('');
    }
    const api = async (url, options) => {
      const res = await fetch(url, Object.assign({ cache: 'no-store' }, options || {}));
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return res.json();
    };
    const postJson = (url, body) => api(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body || {}) });
    async function load() {
      const [s, bl, can, prot, w] = await Promise.all([api('/api/state'), api('/api/backlight'), api('/api/can'), api('/api/protect'), api('/api/wifi/status')]);
      state = s; protect = prot; wifi = w;
      $('topStatus').textContent = `IP ${s.wifi.ip || '--'} · 输出 ${s.output_on ? 'ON' : 'OFF'}`;
      $('outputBtn').textContent = s.output_on ? '关闭输出' : '打开输出';
      $('outputBtn').className = s.output_on ? 'danger' : '';
      $('backlight').value = bl.brightness;
      $('backlightText').textContent = `${bl.brightness} / 255`;
      const baud = String(can.baudrate);
      if (![...$('canBaud').options].some(option => option.value === baud)) {
        const option = document.createElement('option');
        option.value = baud;
        option.textContent = `${can.baudrate} bps`;
        const next = [...$('canBaud').options].find(item => Number(item.value) > Number(baud));
        $('canBaud').insertBefore(option, next || null);
      }
      $('canBaud').value = baud;
      $('canId').value = can.id_hex;
      $('protectToggle').textContent = prot.enabled ? '关闭保护功能' : '开启保护功能';
      $('protectToggle').className = prot.enabled ? 'danger' : '';
      $('protectNotice').hidden = prot.enabled;
      $('wifiText').className = 'info-list';
      $('wifiText').innerHTML = infoHtml([
        ['模式', w.mode],
        ['IP', w.ip],
        ['开机启动', w.boot_enabled ? '开启' : '关闭']
      ]);
      $('wifiBoot').textContent = w.boot_enabled ? '关闭开机启动' : '开启开机启动';
    }
    let backlightTimer = null;
    $('backlight').oninput = () => {
      $('backlightText').textContent = `${$('backlight').value} / 255`;
      if (backlightTimer) clearTimeout(backlightTimer);
      backlightTimer = setTimeout(async () => {
        await postJson('/api/backlight', { brightness: Number($('backlight').value) });
        $('controlMsg').textContent = '背光已保存';
      }, 350);
    };
    $('outputBtn').onclick = async () => { const r = await postJson('/api/output', { state: !(state && state.output_on) }); $('controlMsg').textContent = r.ok ? '输出已更新' : `输出失败: ${r.reason}`; await load(); };
    $('protectToggle').onclick = async () => {
      const enabled = protect ? protect.enabled : true;
      if (enabled && !confirm('关闭保护功能后，设备不会因为过压、欠压、过流或过温自动切断输出。确定要关闭吗？')) return;
      await postJson('/api/protect', { enabled: !enabled }); await load();
    };
    $('saveCan').onclick = async () => {
      const baudrate = Number($('canBaud').value);
      const id = Number($('canId').value);
      if (!Number.isFinite(baudrate) || baudrate <= 0 || !Number.isFinite(id) || id < 0) { alert('CAN 参数格式不正确。'); return; }
      await postJson('/api/can', { baudrate, id }); await load();
    };
    $('wifiOn').onclick = async () => { await postJson('/api/wifi/on'); await load(); };
    $('wifiAp').onclick = async () => { await postJson('/api/wifi/ap'); await load(); };
    $('wifiBoot').onclick = async () => { await postJson('/api/wifi/boot', { enabled: !(wifi && wifi.boot_enabled) }); await load(); };
    $('wifiClear').onclick = async () => { if (confirm('确定清除已保存的 WiFi 吗？')) { await postJson('/api/wifi/clear'); await load(); } };
    $('rebootBtn').onclick = async () => { if (!confirm('确定要重启设备吗？')) return; await postJson('/api/reboot'); $('topStatus').textContent = '设备正在重启'; };
    load().catch(() => $('topStatus').textContent = '读取失败');
    setInterval(() => load().catch(() => {}), 5000);
  </script>
</body>
</html>
