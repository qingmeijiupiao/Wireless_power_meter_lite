<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>状态诊断 - Wireless Power Meter Lite</title>
  <link rel="stylesheet" href="/app.css">
</head>
<body>
  <div class="layout">
    <aside>
      <div class="brand"><h1>Wireless Power Meter Lite</h1><div class="sub" id="topStatus">状态诊断</div></div>
      <nav>
        <a class="tab" href="/">实时概览</a>
        <a class="tab" href="/charts.html">趋势曲线</a>
        <a class="tab" href="/control.html">控制设置</a>
        <a class="tab active" href="/status.html">状态诊断</a>
        <a class="tab" href="/logs.html">实时日志</a>
        <a class="tab" href="/blackbox.html">黑匣子日志</a>
      </nav>
    </aside>
    <main class="stack">
      <div class="page-head"><div><h2>状态诊断</h2><div class="sub">查看系统信息、网络状态、保护详情、校准数据和传感器诊断</div></div><button id="refresh">刷新</button></div>
      <div class="stack">
        <div class="card"><strong>系统</strong><div class="muted" id="systemText">--</div></div>
        <div class="card"><strong>WiFi / Web</strong><div class="muted" id="wifiText">--</div></div>
        <div class="card"><strong>诊断</strong><div class="muted" id="diagText">--</div></div>
      </div>
      <div class="card"><strong>保护详情</strong><div style="overflow:auto"><table id="protectTable"></table></div></div>
      <div class="card"><strong>校准数据</strong><div class="muted" id="calibHead">--</div><div style="overflow:auto"><table id="calibTable"></table></div></div>
    </main>
  </div>
  <script>
    const $ = id => document.getElementById(id);
    const stateName = ['正常', '告警', '保护'];
    const protectName = { OTP: '过温保护', OVP: '过压保护', UVP: '欠压保护', OCP: '过流保护' };
    const wifiModeName = { off: '关闭', sta: 'STA 客户端', ap_provision: 'AP 配网' };
    const wifiStateName = ['未连接', 'STA 已连接', 'AP 已启动'];
    const fmt = (n, d) => Number.isFinite(n) ? Number(n).toFixed(d) : '--';
    function infoHtml(items) {
      return items.map(([label, value]) => `<div class="info-line"><span>${label}</span><span>${value}</span></div>`).join('');
    }
    async function api(url) {
      const res = await fetch(url, { cache: 'no-store' });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return res.json();
    }
    async function load() {
      const [sys, wifi, prot, calib, diag] = await Promise.all([api('/api/system'), api('/api/wifi/status'), api('/api/protect'), api('/api/calibration'), api('/api/diagnostics')]);
      $('topStatus').textContent = `固件 ${sys.firmware.major}.${sys.firmware.minor}.${sys.firmware.patch}`;
      $('systemText').className = 'info-list';
      $('systemText').innerHTML = infoHtml([
        ['硬件版本', `v${sys.hardware_version}`],
        ['固件版本', `${sys.firmware.major}.${sys.firmware.minor}.${sys.firmware.patch}`],
        ['构建时间', `${sys.firmware.build_date} ${sys.firmware.build_time}`],
        ['运行时间', `${Math.floor(sys.uptime_ms / 1000)}s`]
      ]);
      $('wifiText').className = 'info-list';
      $('wifiText').innerHTML = infoHtml([
        ['模式', wifiModeName[wifi.mode] || wifi.mode],
        ['状态', wifiStateName[wifi.state] || '未知'],
        ['IP 地址', wifi.ip || '--'],
        ['已保存 SSID', wifi.saved_ssid || '(无)'],
        ['配网热点 SSID', wifi.ap_ssid || '--'],
        ['信号强度', wifi.state === 1 ? `${wifi.rssi} dBm (${wifi.signal_percent}%)` : '--'],
        ['信道', wifi.channel_available ? wifi.channel : '--'],
        ['STA MAC', wifi.sta_mac],
        ['AP MAC', wifi.ap_mac],
        ['开机启动', wifi.boot_enabled ? '开启' : '关闭'],
        ['最近错误', wifi.last_error || '(无)']
      ]);
      $('diagText').className = 'info-list';
      $('diagText').innerHTML = diag.ina226.available ? infoHtml([
        ['电流原始值', diag.ina226.current_register_raw],
        ['电压原始值', diag.ina226.voltage_register_raw]
      ]) : '<div class="muted">INA226 原始寄存器暂不可用</div>';
      $('protectTable').innerHTML = '<tr><th>项目</th><th>状态</th><th>当前值</th><th>告警/恢复</th><th>保护/恢复</th></tr>' + prot.channels.map(c => `<tr><td>${protectName[c.name] || c.name}</td><td>${stateName[c.state] || c.state_text}</td><td>${fmt(c.value, 3)} ${c.unit}</td><td>${fmt(c.warning, 3)} / ${fmt(c.warning_recovery, 3)}</td><td>${fmt(c.protect, 3)} / ${fmt(c.protect_recovery, 3)}</td></tr>`).join('');
      $('calibHead').className = 'info-list';
      $('calibHead').innerHTML = infoHtml([
        ['电流系数', calib.current_base_k],
        ['采样电阻', `${fmt(calib.sample_resistance_mohm, 3)} mΩ`],
        ['温度系数', calib.temperature_k],
        ['基准温度', `${fmt(calib.base_temperature_c, 2)} C`]
      ]);
      $('calibTable').innerHTML = '<tr><th>点位</th><th>寄存器值</th><th>无偏移电流(mA)</th><th>偏移(uA)</th></tr>' + calib.points.map(p => `<tr><td>${p.index}</td><td>${p.register_value}</td><td>${p.no_offset_ma}</td><td>${p.offset_ua}</td></tr>`).join('');
    }
    $('refresh').onclick = () => load().catch(() => $('topStatus').textContent = '读取失败');
    load().catch(() => $('topStatus').textContent = '读取失败');
  </script>
</body>
</html>
